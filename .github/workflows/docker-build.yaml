name: "Docker Image Build Check"

on:
  push:
    # app フォルダ配下の変更か、このワークフロー自体の変更があった時だけ動かす
    paths:
      - 'app/**'
      - '.github/workflows/docker-build.yml'
    branches:
      - main
  workflow_dispatch: # 手動実行も可能にする

jobs:
  build:
    name: "Build Streamlit App"
    runs-on: ubuntu-latest # DockerビルドはLinux(ubuntu)が高速で標準的です

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        # appフォルダに移動してビルドを実行します
        run: |
          cd app
          docker build -t my-streamlit-app:${{ github.sha }} .
          
      - name: Image Build Success Check
        run: echo "Docker image for Streamlit app was built successfully."