name: Docker Build and Test

on:
  push:
  pull_request:
  workflow_dispatch: # 手動実行も可能にしています

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 1. 日本語フォントのインストール（文字化け対策）
      - name: Install Japanese Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore Docker build cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: docker-buildx-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('app/Dockerfile', 'app/requirements.txt') }}
          restore-keys: |
            docker-buildx-${{ runner.os }}-${{ github.ref_name }}-
            docker-buildx-${{ runner.os }}-

      - name: Build Docker image
        run: |
          export DOCKER_BUILDKIT=1
          docker buildx build --load \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -t my-streamlit-app:test app
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Start app container
        run: |
          docker run -d --name test-app -p 8501:8501 my-streamlit-app:test

      - name: Wait for Streamlit to become available
        run: |
          for i in $(seq 1 20); do
            if curl --silent --fail http://127.0.0.1:8501/ >/dev/null 2>&1; then
              echo "Streamlit is ready"
              exit 0
            fi
            echo "Waiting for Streamlit... ($i/20)"
            sleep 3
          done
          echo "Streamlit did not start in time" >&2
          exit 1

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements-test.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Restore Playwright cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements-test.txt') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright and run tests
        run: |
          python -m pip install -r requirements-test.txt
          playwright install --with-deps chromium
          # ログをファイルに書き出すように変更
          pytest app/tests/test_app.py > pytest_log.txt 2>&1

      - name: Analyze Failure with Copilot and Create Issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. ラベルがなければ作成する（エラーは無視）
          gh label create "automated-report" --color "ed225d" --description "Auto-generated by GitHub Actions" || true
          
          # 2. ログを取得
          ERROR_LOG=$(tail -n 100 pytest_log.txt || echo "No log found")
          
          # 3. 解析結果の組み立て
          # ヒント：将来的にここに Copilot の解析を入れる予定
          ANALYSIS="### 🤖 AI Failure Analysis
          **原因の可能性:** テスト中に期待した要素が見つかりませんでした。
          **修正案:** Playwrightのコード内のセレクタを確認し、必要に応じて \`sleep\` ではなく \`expect\` のタイムアウトを調整してください。
          
          **エラーログ抜粋:**
          \`\`\`
          $ERROR_LOG
          \`\`\`"
          
          # 4. Issue作成
          gh issue create \
            --title "❌ Test Failure: Playwright UI Test" \
            --body "$ANALYSIS" \
            --label "bug,automated-report" # カンマの後のスペースを削除

      - name: Upload Playwright screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: app/tests/screenshots

      - name: Stop and cleanup
        if: always()
        run: |
          docker rm -f test-app || true