name: Docker Build and Test

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore Docker build cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: docker-buildx-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('app/Dockerfile', 'app/requirements.txt') }}
          restore-keys: |
            docker-buildx-${{ runner.os }}-${{ github.ref_name }}-
            docker-buildx-${{ runner.os }}-

      - name: Build Docker image
        run: |
          export DOCKER_BUILDKIT=1
          docker buildx build --load \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -t my-streamlit-app:test app
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Start app container
        run: |
          docker run -d --name test-app -p 8501:8501 my-streamlit-app:test

      - name: Wait for Streamlit to become available
        run: |
          for i in $(seq 1 20); do
            if curl --silent --fail http://127.0.0.1:8501/ >/dev/null 2>&1; then
              echo "Streamlit is ready"
              exit 0
            fi
            echo "Waiting for Streamlit... ($i/20)"
            sleep 3
          done
          echo "Streamlit did not start in time" >&2
          exit 1

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements-test.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Restore Playwright cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements-test.txt') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright and run tests
        run: |
          python -m pip install -r requirements-test.txt
          playwright install chromium
          pytest app/tests/test_app.py

      - name: Upload Playwright screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: app/tests/screenshots

      - name: Stop and cleanup
        if: always()
        run: |
          docker rm -f test-app || true