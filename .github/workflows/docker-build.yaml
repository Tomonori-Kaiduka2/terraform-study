- name: Build Docker Image
  run: |
    cd app
    docker build -t my-streamlit-app:test .

- name: Run App and Test
  run: |
    # コンテナを起動
    docker run -d --name test-app -p 8501:8501 my-streamlit-app:test
    
    # Playwrightの実行環境（Pythonライブラリ）をインストール
    pip install pytest-playwright
    playwright install --with-deps chromium
    
    # 起動待ち（Streamlitが安定するまで少し待機）
    sleep 10
    
    # テスト実行
    pytest app/tests/test_app.py

- name: Stop and Cleanup
  if: always()
  run: docker rm -f test-app