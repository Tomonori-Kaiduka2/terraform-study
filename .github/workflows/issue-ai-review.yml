name: Issue AI Review

on:
  issues:
    types:
      - opened
      - labeled
  issue_comment:
    types:
      - created

jobs:
  ai_review:
    name: AI Issue Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install google-genai PyGithub

      - name: Run AI issue analysis
        env:
          # Pythonコードが要求している名前に合わせる
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # これが必要！
          GITHUB_REPOSITORY: ${{ github.repository }}   # これも必要！
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body || '' }}
          GEMINI_MODEL: "gemini-2.0-flash" # 必要ならここでモデルを指定
        run: |
          # 以前のGCPサービスキー関連の処理は不要になったので削除
          python .github/scripts/issue_analysis.py