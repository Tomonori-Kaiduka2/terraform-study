name: "AI Agent Mass Production"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  terraform:
    name: "Mass Provisioning"
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        # ここで terraform.tfvars のリストを読み込み、一気に量産します
        run: terraform apply -auto-approve -input=false

      - name: Upload All Agent Environments
        uses: actions/upload-artifact@v4
        with:
          name: all-agent-packages
          # フォルダ名が何であっても、すべてのエージェントの成果物を回収する指定です
          # 「*/doc/」と「*/scripts/」の中身を再帰的に取得します
          path: |
            ./**/doc/*.txt
            ./**/scripts/*.ps1