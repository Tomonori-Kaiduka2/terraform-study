name: "Terraform Apply and Save"

on:
  push:
    branches:
      - main

jobs:
  terraform:
    name: "Build and Save Files"
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        # -auto-approve を付けることで「本当に作っていいですか？」という確認をスキップします
        run: terraform apply -auto-approve -input=false

      - name: Upload Report File
        # 作成されたファイルをGitHubの画面からダウンロードできるようにします
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs    # ダウンロード時の名前
          path: ./*.txt              # すべてのテキストファイルを保存対象にする